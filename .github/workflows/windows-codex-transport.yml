name: Windows Codex transport
on:
  pull_request:
    paths:
      - "src/limitora/providers/*codex*.py"
      - "src/limitora/_runner_path.py"
      - "tests/test_codex*.py"
      - "tests/test_runner_path.py"
      - ".github/workflows/windows-codex-transport.yml"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  codex-transport:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Run hermetic Codex tests
        shell: pwsh
        run: |
          $env:PYTHONDONTWRITEBYTECODE = "1"
          $env:PYTHONPATH = "src"
          python -m unittest tests.test_codex_jsonl_transport tests.test_codex_jsonl_protocol tests.test_codex_jsonl tests.test_codex_jsonl_mapping tests.test_codex_provider tests.test_runner_path -v
